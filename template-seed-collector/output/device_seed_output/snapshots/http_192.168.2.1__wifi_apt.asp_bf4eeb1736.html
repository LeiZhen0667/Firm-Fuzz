function checklan(){
	var f=document.APT;
	var token;
	if((f.ap_ip[0].value)!='192' || (f.ap_ip[1].value)!='168')
	{
		if((f.ap_ip[0].value)!='10'){
			if ((f.ap_ip[0].value)!='172' || (f.ap_ip[1].value) < 16 || (f.ap_ip[1].value) > 31)
			{
				alert(langDictionary[1240]);
				return false;
			}
		}
	}
	if((f.ap_ip[0].value)=='192' && (f.ap_ip[1].value)=='168')
	{
		if(validateLanNetmask(f.mask.value)==false) return false;
	}
	if((f.ap_ip[0].value)=='10')
	{	
		if(validateLanClassANetmask(f.mask.value)==false) return false;
	}
	if ((f.ap_ip[0].value=='172') && (f.ap_ip[1].value >=16) && (f.ap_ip[1].value <=31))
	{	
		if(validateLanClassANetmask(f.mask.value)==false) return false;
	}
	return true;
}
function validateLanNetmask(val)
{
	if(val!='255.255.255.0' && val!='255.255.255.128' && val!='255.255.255.192' && val!='255.255.255.224' &&
		val!='255.255.255.240' && val!='255.255.255.248' && val!='255.255.255.252' )
	{
		alert(langDictionary['vjs42']);//ken 20130123
		return false;
	}
}
function validateLanClassANetmask(val)
{
        if(val!='255.255.255.0' && val!='255.255.255.128' && val!='255.255.255.192' && val!='255.255.255.224' &&
                val!='255.255.255.240' && val!='255.255.255.248' && val!='255.255.255.252' && val!='255.255.255.254'&&
                val!='255.255.0.0' && val!='255.255.128.0' && val!='255.255.192.0' && val!='255.255.224.0' &&
                val!='255.255.240.0' && val!='255.255.248.0' && val!='255.255.252.0' && val!='255.255.254.0' &&
                val!='255.0.0.0' && val!='255.128.0.0' && val!='255.192.0.0' && val!='255.224.0.0' &&
                val!='255.240.0.0' && val!='255.248.0.0' && val!='255.252.0.0' && val!='255.254.0.0')
        {
                alert(langDictionary['vjs42']);//ken 20130123
                return false;
        }
}
function SubmitDelayA(time){
	$.get("getLoginStatus.asp", { noCache: Math.floor(Math.random() * 10000) }, function (data) {
		if(data == 0){
			document.location.replace("000-dashboard.asp?LockUrl=loginlock");
			return  ;
		}
		else{
		        showMsgMask("p800");
		        window.clearInterval(StopBGfunction);
		        $("#p800Progress").animate({width: '100%'}, time*1000,function(){
		                ChkRebootTypeStop = self.setInterval("SubmitDelayB(5000)", 1000);
		        });
		}
        });
}
function SubmitDelayB(time){
        showMsgMask("p801");
        window.clearInterval(ChkRebootTypeStop);
        ChkRebootTypeStop = self.setInterval("ChkRebootTypeC()", time);
}

function ChkRebootTypeC(){
	if(ap_onoff == 1){
		if(window.location.port == null)
			window.top.location.assign("http://"+document.APT.ip.value+"/wifi_apt.asp")
		else
			window.top.location.assign("http://"+document.APT.ip.value+":"+window.location.port+"/wifi_apt.asp")
	}
	else if(ap_onoff == 0){
		if(window.location.port == null)
			window.top.location.assign("http://192.168.2.1/wifi_apt.asp")
		else
			window.top.location.assign("http://"+location.hostname+":"+window.location.port+"/wifi_apt.asp")
	}	
	//location.reload();
	window.clearInterval(ChkRebootTypeStop);
}
