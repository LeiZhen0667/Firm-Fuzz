function funClock() {
	if (!document.layers && !document.all && !document.getElementById)
		return;
	var runTime = new Date();
	var hours = document.tF.hour.value;
	var minutes = document.tF.min.value;
	var seconds = document.tF.sec.value;
	var dn = "AM";
	if (hours >= 12) {
		dn = "PM";
		hours = hours - 12;
	}
	if (seconds == 0)
	{
		minutes++;
		document.tF.min.value++;
		if(minutes ==60)
		{
			hours++;
			document.tF.hour.value++;
			minutes = 0;
			document.tF.min.value = 0;
		}
	}
	if (hours == 0) hours = 12;
	if (hours == 12 && minutes==0 && seconds == 0)
	{
		setTimeout('document.location.href="util_system.asp";',0);
	}
	var temp_min=String(minutes);
	if (minutes <= 9 && temp_min.length==1) minutes = "0" + minutes;
	if (seconds <= 9) seconds = "0" + seconds;
	movingtime = "<font color=red size=3><b>"+ hours + ":" + minutes + ":" + seconds + " " + dn + "</b></font>";
	if (document.layers) {
		document.layers.u_clock.document.write(movingtime);
		document.layers.u_clock.document.close();
	}
	else if (document.all) u_clock.innerHTML = movingtime;
	else if (document.getElementById)
	{
		var CL=document.getElementById("u_clock");
		CL.innerHTML = movingtime;
	}
	document.tF.sec.value++;
	if(document.tF.sec.value>59) document.tF.sec.value = 0;
	setTimeout("funClock()", 1000)
}

	if(timeout_token.length==2)
	{
		var a_str=timeout_token.substring(0,1);
		if(a_str!='1' && a_str!='2' && a_str!='3' && a_str!='4' && a_str!='5'

		{

		}

		{
			alert(langDictionary[738]);
			return false;
		}
	}
	else
	{
		var a_str=timeout_token.substring(0,1);
		if(a_str!='1' && a_str!='2' && a_str!='3' && a_str!='4' && a_str!='5'

		{
			alert(langDictionary[738]);
			return false;

{

*/
	if($('input[name="rm_en"]')[0].checked == true){

			//if(!(isBlank(f.rm_ip[0].value))||!(isBlank(f.rm_ip[1].value))||!(isBlank(f.rm_ip[2].value))||!(isBlank(f.rm_ip[3].value)))
			//{
				if(isNValidEndIP_1ST(f.rm_ip[0].value) || isIncludeDot(f.rm_ip[0].value)) { alert(langDictionary[1360]); return false; 	}
				if(isNValidIP(f.rm_ip[1].value) || isIncludeDot(f.rm_ip[1].value)) { alert(langDictionary['usysipm']);return false; 	}
				if(isNValidIP(f.rm_ip[2].value) || isIncludeDot(f.rm_ip[2].value)) { alert(langDictionary['usysipm']); return false; 	}//20130123 ken
				if(isNValidEndIP_4TH(f.rm_ip[3].value) || isIncludeDot(f.rm_ip[3].value)) { alert(langDictionary[675]); return false; 	}
			//}
		}
		if(isNValidPort(f.remotePort.value))
		{
			alert(langDictionary['usys92']);//20130123 ken
			return false;
		}
		else if(f.remotePort.value == 80){
			alert(langDictionary[85]);//20130123 ken
			return false;
		}
		else if(f.checkremote.checked == true || !(isBlank(f.rm_ip[0].value)))
		{
			var portRange = "";
			var remotePort = f.remotePort.value;
			v0 = 0;
			v1 = portRange.indexOf('-');
			while(v1 != -1)
			{
				v2 = portRange.indexOf(' ', v1 + 1);
				if(parseInt(remotePort) >= parseInt(portRange.substring(v0, v1))
					&& parseInt(remotePort) <= parseInt(portRange.substring(v1 + 1, v2)))
				{
					alert(langDictionary['fvrm']);
					return false;
				}
				if(v2 == portRange.length - 1)
					break;
				v0 = v2 + 1;
				v1 = portRange.indexOf('-', v2 + 1);
			}
		}
	}
	f.eco_day.value = 0
	if (f.eco_day1.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 1
	if (f.eco_day2.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 2
	if (f.eco_day3.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 4
	if (f.eco_day4.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 8
	if (f.eco_day5.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 16
	if (f.eco_day6.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 32
	if (f.eco_day7.checked == true) f.eco_day.value = parseInt(f.eco_day.value) + 64

	if (f.eco_dis.checked == true)
		f.eco_dis_value.value = 1
	else
		f.eco_dis_value.value = 0

	if(!(isBlank(f.userOldPswd.value)
		&& isBlank(f.sysPasswd.value)
		&& isBlank(f.sysConfirmPasswd.value)))
	{
		if(!validVisibleStr(f.userOldPswd.value))
		{
			f.userOldPswd.focus();
			f.userOldPswd.select();
			alert(langDictionary[623]);
			return false;
		}
		if(!validVisibleStr(f.sysPasswd.value))
		{
			f.sysPasswd.focus();
			f.sysPasswd.select();
			alert(langDictionary[623]);
			return false;
		}
	        $.post("/goform/formCheckUserPassword", {
			NoCache: Math.floor(Math.random() * 10000),
			userpwd: base64encode(f.userOldPswd.value)
		} ,function(data){
			if(data == 2){ //admin password not match
				f.userOldPswd.focus();
				f.userOldPswd.select();
				alert(langDictionary[623]);
				return false;
			}
			else if(f.sysPasswd.value != f.sysConfirmPasswd.value){ //confirm password not match
				f.sysConfirmPasswd.focus();
				f.sysConfirmPasswd.select();
				alert(langDictionary[624]);
				return false;
			}
			else if(data == 0 && f.sysPasswd.value == f.sysConfirmPasswd.value){ //password are match
				if((f.sysPasswd.value.length < 3 || f.sysPasswd.value.length > 12)
					&& f.sysPasswd.value != "")
				{
					f.sysPasswd.focus();
					f.sysPasswd.select();
					alert(langDictionary[626]);
					return false;
				}
				f.sysPasswd2.value = base64encode(f.sysPasswd.value)
				if(storeData()==false)return false;
				$.post("/goform/formSetSystemSettings", $("#p600706").serialize());
			        SubmitDelay(15);
				return true;
				
			}
		},"html");
	}
	else{
		if(storeData()==false)return false;
		$.post("/goform/formSetSystemSettings", $("#p600706").serialize());
		SubmitDelay(15);
		return true;
	}
}
