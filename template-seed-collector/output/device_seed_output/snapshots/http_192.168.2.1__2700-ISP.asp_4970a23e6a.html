	$("#StaticHeader").removeClass("offline").removeClass("online");

	}

	if(wan_mode == 3 || wan_mode == 6){ //L2TP+PPTP
		ChkISPConnect("L2TP")
		StopChkISPConnect = self.setInterval('ChkISPConnect("L2TP")', 5000);
	}
}

var StopChkISPConnect
function ChkISPConnect(openitem) {
	var HeaderID = "#" + openitem + "Header"
	var StateID = "#" + openitem + "State"
	$.get("getPhysicLink.asp", function(data) {
		if (data == 1) {
			$.get("getWanConnect.asp", function(data) {
				if (data == 1) { //online
					$(HeaderID).removeClass("offline").addClass("online")
					$(StateID).removeClass("offline").addClass("online")
					$(StateID).attr("tid","gtYouAreOnline")
					$(StateID).html(langDictionary["gtYouAreOnline"])
					$(StateID).show()
					$('#p2702,#p2703').hide()
					if($('#p300iOnline').is(":hidden") )
						$('#p2701').show()
				}
				else{ //offline
					$(HeaderID).removeClass("online").addClass("offline")
					$(StateID).removeClass("online").addClass("offline")
					$(StateID).attr("tid","gtYouAreOffline")
					$(StateID).html(langDictionary["gtYouAreOffline"])
					$(StateID).show()
					$('#p2701,#p2703,#p300iOnline').hide()
					$('#p2702').show()
				}
			});
		}
		else{ //Disconnected
			$(HeaderID).removeClass("online").addClass("offline")
			$(StateID).removeClass("online").addClass("offline")
			$(StateID).attr("tid","gtYouAreOffline")
			$(StateID).html(langDictionary["gtYouAreOffline"])
			$(StateID).show()
			$('#p2701,#p2702,#p300iOnline').hide()
			$('#p2703').show()
		}
	});
}

function ChkPPPoE_PING(){
	$.get("BelkinAPI/GetPrePINGorNot.asp", { noCache: Math.floor(Math.random() * 10000) }, function (data) {
		if(data==1){
			retryPING=0;
			$.get("getDNSorNot.asp", { noCache: Math.floor(Math.random() * 10000) }, function (data) {
				if(data==1){
					window.clearInterval(ChkPPPoE_PINGStop);
					retryPPPoE = 0;
					window.location = "2700-ISP.asp?S";
				}
				else{
					window.location = "FWGUI_ISP3.asp";
				}
			});
		}else{
			retryPING++;
			if(retryPING==5){
				window.clearInterval(ChkPPPoE_PINGStop);
				window.location = "FWGUI_ISP3.asp";
			}
		}
	});
}
function isSecTryPPPoE(){
	if($("#p212").css("display")=="block")
		return 1;
	else
		return 0;
}
function ChkPPPoEcredential(){
	$.post("/goform/formSetWanPPPoE", $("#p2700f001").serialize(),function(data){
		if(data=="ok"){
			window.clearInterval(ChkPPPoEcredentialStop);
			ChkPPPoE_PING();
			ChkPPPoE_PINGStop = self.setInterval("ChkPPPoE_PING()",3000);
			retryPPPoE=0;
		}
		else if(data=="fail" || data == "AccessReject" ){
			if(retryPPPoE==3){
				window.clearInterval(ChkPPPoEcredentialStop);
				if(isSecTryPPPoE())
					window.location = "FWGUI_ISP4.asp?4";
				else{
					closeMsgMask("p211");
					$("#p212").show();
					retryPPPoE=0;
				//	ISPConnectSelect();
				}
			}
			retryPPPoE++
		}
	},"text");
}
function ChkSubmit_L2TP(){
	cur_username = $("#p2700fL2TPUser").val();
	cur_password = $("#p2700fL2TPPass").val();
	cur_username = cur_username.replace(/(^\s*)|(\s*$)/g, "");
	cur_password = cur_password.replace(/(^\s*)|(\s*$)/g, "");
	$("#p2700fL2TPUser").val(cur_username);
	$("#p2700fL2TPPass").val(cur_password);
	if ( cur_username == "")
	{
		$('#p2700eL2TPUser').html(translate("errUsernameEmpty"));
		$('#p2700eL2TPUser').fadeTo(200, 1);
		$("#p2700fL2TPUser").focus();
		return false;
	}
	if( cur_username.length >=64 )
	{
		$('#p2700eL2TPUser').html(translate("errUsernameTooLong"));
		$('#p2700eL2TPUser').fadeTo(200, 1);
		$("#p2700fL2TPUser").focus();
		return false;
	}
	if( !validVisibleStr(cur_username) )
	{
		$('#p2700eL2TPUser').html(translate("errUsernameInvalid"));
		$('#p2700eL2TPUser').fadeTo(200, 1);
		$("#p2700fL2TPUser").focus();
		return false;
	}
	$('#p2700eL2TPUser').hide();

	if ( cur_password == "")
	{
		$('#p2700eL2TPPass').html(translate("errPasswordEmpty"));
		$('#p2700eL2TPPass').fadeTo(200, 1);
		$("#p2700fL2TPPass").focus();
		return false;
	}
	if( cur_password.length >=64 )
	{
		$('#p2700eL2TPPass').html(translate("errPasswordTooLong"));
		$('#p2700eL2TPPass').fadeTo(200, 1);
		$("#p2700fL2TPPass").focus();
		return false;
	}
	if( !validVisibleStr(cur_password) )
	{
		$('#p2700eL2TPPass').html(translate("errPasswordInvalid"));
		$('#p2700eL2TPPass').fadeTo(200, 1);
		$("#p2700fL2TPPass").focus();
		return false;
	}
	$('#p2700eL2TPPass').hide();

	gateway =  $("#p2700fL2TPServ").val();
	if ( gateway == "")
	{
		$('#p2700eL2TPServ').html(translate("errServAddressEmpty"));
		$('#p2700eL2TPServ').fadeTo(200, 1);
		$("#p2700fL2TPServ").focus();

function ExpandableOne(openitem){
	for (var i in names) {
		var contentID = "#" + names[i].substr(0, names[i].length-6), caretID = contentID + "Caret";
		if (openitem == names[i]) {
			if ($(contentID).is(":hidden")) {
				$(caretID).rotate({animateTo:0, duration:600});
			} else {
				$(caretID).rotate({animateTo:180, duration:600});
			}
			$(contentID).slideToggle(600);
		} else {
			$(contentID).slideUp();
			$(caretID).rotate({animateTo:180, duration:600});
		}
	}
}
function AllExpandableClose(){
	for (var i in names) {
		var contentID = "#" + names[i].substr(0, names[i].length-6), caretID = contentID + "Caret";
		$(contentID).slideUp();
		$(caretID).rotate({animateTo:180, duration:600});
	}
}
function validatePPPMTU(val)
{
	mval = val;
	mval = mval-0;
	if(val.length<3 || mval<500 || mval>1500)
	{
		return false;
	}
	for(i=0; i<val.length; i++)
	{
		if(val.charAt(i)<'0' || val.charAt(i)>'9')
		{
			return false;
		}
	}
	return true;
}
