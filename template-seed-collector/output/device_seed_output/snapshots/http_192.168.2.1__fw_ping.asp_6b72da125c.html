function initDataHeader(){
	$("#dhSSID").html(HTMLEnCode(ssid));
	$("#dhToggleBand").html(langDictionary["dhToggleBand"]);//ken
	var encrypt = 2
	if (encrypt == 0){
		str24genc=""
		str24gpwd=""
	}
	else if(encrypt == 1){
		var wepValueAll = new Array("0000000000","0000000000","0000000000","0000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000")
		if (0 == 1){
			str24genc="64bit WEP"
			str24gpwd=wepValueAll[0]
		}
		else{
			str24genc="128bit WEP"
			str24gpwd=wepValueAll[4]
		}
	}
	else{
		str24genc="WPA/WPA2-Personal (PSK)"
		str24gpwd="66caye9w"
	}
	encrypt = 2
	if (encrypt == 0){
		str5gpwd=""
	}
	else if(encrypt == 1){
		var wepValueAll = new Array("0000000000","0000000000","0000000000","0000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000")
		if (0 == 1){
			str5gpwd=wepValueAll[0]
		}
		else{
			str5gpwd=wepValueAll[4]
		}
	}
	else{
		str5gpwd="66caye9w"
	}

	ChkinitConnectType();
	$.get("getLoginStatus.asp", { NoCache: ts }, function (data) {
		if(data == 0){
			str24gpwd=TexttoEncry(str24gpwd)
			$("#dhPasswordObscured24").html(HTMLEnCode(str24gpwd));
		}
		else{
			$("#dhPasswordObscured24").html(HTMLEnCode(str24gpwd));
		}
	})

	StopBGfunction = self.setInterval("ChkinitConnectType()", 5000);
} 
function evaltF(){
	var f = document.tF

	else 	f.pingenable.value=0
	$.post("/goform/formWanPingBlocking", $("#p600606").serialize());
	SubmitDelay(2);
} 
</script>
