				$("#p2300a010").hide();
			}
			else if(data=="up_to_date"){
				$("#p1302").show();
				$("#p2300a010").show();
			}
			else{
				FW_Server_Alive=0
				$("#p1302").show();
				$("#p2300a010").show();
			}
		},"text")
		.fail(function() {

			$("#p2300a010").show();
		});
	}
	else{

		$("#p2300a010").show();
	}
}

function CheckFWUpload(){
	$.get("BelkinAPI/GetUploadFileStatus.asp", { NoCache: Math.floor(Math.random() * 10000) }, function (data) {
		if(data == 1){

			window.clearInterval(CheckFWUploadStop);
			document.location.replace("2300-FWUpdate.asp?1318");

			reTest++;
			if(reTest==4){
				window.clearInterval(CheckFWUploadStop)
				install_status = 1;
			}
			return true;
		}
	});
}
