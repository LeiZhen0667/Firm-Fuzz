function storeData()
{
	var lan_dhcpStart='192.168.2.2';

	last_ip=dhcp_start.indexOf('.',(last_ip+1));
	var lan_sebnet=dhcp_start.substring(0,last_ip);
	var virtual_server_host;
	var str_ip;
	var temp_str='';
	var temp_des_str='';
	i=1;
	while(i<=20)
	{
		if(eval("document.tF.private_ip_"+i+".value")!='')
		{
			virtual_server_host = lan_sebnet+'.'+eval("document.tF.private_ip_"+i+".value");
			/* Can type Gateway IP	
			if(document.tF.lan_ip.value == virtual_server_host){
				if(eval("document.tF.enable_"+i+".checked")==true){
					alert(msg_hostIP_invalid);
					eval("document.tF.private_ip_"+i+".focus();");
					return false;
				}
			}
			*/
			if(eval("document.tF.private_ip_"+i+".value") <= 0 || eval("document.tF.private_ip_"+i+".value") >= 255 ){
				alert(langDictionary[130])
				return false;
			}
			else if(isIncludeDot(eval("document.tF.private_ip_"+i+".value")) ){
				alert(langDictionary[1240])
				return false;
			}
			if(eval("document.tF.enable_"+i+".checked")==true) temp_str+='1';
			else    temp_str+='0';
			var temp_des=eval("document.tF.description_"+i+".value");
			if(validVisibleStr(temp_des)==false){
				alert(langDictionary['msg_invalid_char_'])
				return false
			}
			t1=temp_des.indexOf(' ');
			while(t1!=-1)
			{
				temp_des=temp_des.replace(' ','__');
				t1=temp_des.indexOf(' ');
			}
			temp_str+='-x';
			if(temp_des!='') temp_des_str+=temp_des+" ";
			else temp_des_str+="__ ";
			var in_port_low=eval("document.tF.inbound_port_low_"+i+".value");
			var in_port_high=eval("document.tF.inbound_port_high_"+i+".value");
			var pr_port_low=eval("document.tF.private_port_low_"+i+".value");
			var pr_port_high=eval("document.tF.private_port_high_"+i+".value");
			if (in_port_high != pr_port_high || in_port_low != pr_port_low){ 
				alert(langDictionary[132]);
				eval("document.tf.inbound_port_"+i+".focus();"); return false;
			}
			else if(in_port_high < pr_port_high){
				alert(langDictionary[132]);
				eval("document.tf.inbound_port_"+i+".focus();"); return false;
			}
			/*
			if (in_port_high>in_port_low && (in_port_high!=pr_port_high || in_port_low!=pr_port_low)){ 
				alert(fv201);
				eval("document.tF.inbound_port_"+i+".focus();"); return false;
			}
			else if(in_port_high==in_port_low && pr_port_low!=pr_port_high){
				alert(fv201);
				eval("document.tF.inbound_port_"+i+".focus();"); return false;
			}
			*/
			var type=eval("document.tF.type_"+i+".value");
			if (eval("document.tF.enable_"+i+".checked")==true){
				for (j=1;j<i;j++){
					if (eval("document.tF.type_"+j+".value")==type){
						var in_port_low_j=eval("document.tF.inbound_port_low_"+j+".value");
						var in_port_high_j=eval("document.tF.inbound_port_high_"+j+".value");
						if ((in_port_low_j-0)>=in_port_low&&(in_port_low_j-0)<=in_port_high
							|| (in_port_high_j-0)>=in_port_low&&(in_port_high_j-0)<=in_port_high
							|| (in_port_low-0)>=in_port_low_j&&(in_port_low-0)<=in_port_high_j
							|| (in_port_high-0)>=in_port_low_j&&(in_port_low-0)<=in_port_high_j) {
							alert("Entry "+j+" and "+i+" have same protocol and overlapped port range.");
							eval("document.tF.inbound_port_"+i+".focus();"); return false;
						}
					}
				}
			}
			temp_str+='-'+in_port_low;
			temp_str+='-'+in_port_high;
			temp_str+='-'+type
			temp_str+='-'+eval("document.tF.private_ip_"+i+".value");
			temp_str+='-'+pr_port_low;
			temp_str+='-'+pr_port_high;
			temp_str+=' ';
		}
		i++;
	}
	document.tF.fwi.value=temp_str;
	document.tF.fwi_des.value=temp_des_str;
	return true;
}
function evaltF()
{
	for(tmp=1 ; tmp <=20 ; tmp++){
		inboundport=eval('document.tF.inbound_port_'+tmp+'.value')
		t1=inboundport.indexOf('-');
		if(t1 == -1){
			eval('document.tF.inbound_port_low_'+tmp+'.value = document.tF.inbound_port_'+tmp+'.value')
			eval('document.tF.inbound_port_high_'+tmp+'.value = document.tF.inbound_port_'+tmp+'.value')
		}
		else{
			eval('document.tF.inbound_port_low_'+tmp+'.value = inboundport.substring(0,t1)' )
			eval('document.tF.inbound_port_high_'+tmp+'.value = inboundport.substring(t1+1)' )
		}
		privateport=eval('document.tF.private_port_'+tmp+'.value')
		t1=privateport.indexOf('-');
		if(t1 == -1){
			eval('document.tF.private_port_low_'+tmp+'.value = document.tF.private_port_'+tmp+'.value')
			eval('document.tF.private_port_high_'+tmp+'.value = document.tF.private_port_'+tmp+'.value')
		}
		else{
			eval('document.tF.private_port_low_'+tmp+'.value = privateport.substring(0,t1)' )
			eval('document.tF.private_port_high_'+tmp+'.value = privateport.substring(t1+1)' )
		}
	}
	for(tmp=1;tmp<=6;tmp++)
	{
		if(!(isBlank(eval("document.tF.private_ip_"+tmp+".value"))) || !(isBlank(eval("document.tF.private_port_low_"+tmp+".value"))) || !(isBlank(eval("document.tF.inbound_port_low_"+tmp+".value"))) || !(isBlank(eval("document.tF.private_port_high_"+tmp+".value"))) || !(isBlank(eval("document.tF.inbound_port_high_"+tmp+".value"))) )
		{
			if (isNValidIP(eval("document.tF.private_ip_"+tmp+".value"))){ alert(langDictionary[130]); return false; }
			if (isNValidPort(eval("document.tF.private_port_low_"+tmp+".value")) || isNValidPort(eval("document.tF.inbound_port_low_"+tmp+".value"))){ alert(langDictionary[88]); return false; }
			if (isNValidPort(eval("document.tF.private_port_high_"+tmp+".value")) || isNValidPort(eval("document.tF.inbound_port_high_"+tmp+".value"))){ alert(langDictionary[88]); return false; }
			if ((parseInt(eval("document.tF.inbound_port_low_"+tmp+".value")) <= parseInt("") && parseInt(eval("document.tF.inbound_port_high_"+tmp+".value")) >= parseInt("")) && (eval("document.tF.enable_"+tmp+".checked") == true) && (document.tF.h_remote_management.value == "enable" ))
			{
				alert(langDictionary['fvrm']);
				eval("document.tF.inbound_port_"+tmp).focus();
				eval("document.tF.inbound_port_"+tmp).select();
				return false;
			}
			/*if (eval("document.tF.inbound_port_low_"+tmp+".value") == 88){ alert(fvrm); return false; } */
			if (!(isBlank(eval("document.tF.inbound_port_high_"+tmp+".value")))&&(eval("document.tF.inbound_port_low_"+tmp+".value")>eval("document.tF.inbound_port_high_"+tmp+".value"))) { alert(langDictionary[132]); return false; }
			if (!(isBlank(eval("document.tF.private_port_high_"+tmp+".value")))&&(eval("document.tF.private_port_low_"+tmp+".value")>eval("document.tF.private_port_high_"+tmp+".value"))) { alert(langDictionary[133]); return false; }
		}
	}

	/* check inbound ports' singleness */
	for(tmp = 1;tmp <= 20; tmp++)
	{
		if(!eval("document.tF.enable_"+tmp+".checked"))
			continue;
	        
		if(!(isBlank(eval("document.tF.private_ip_"+tmp+".value"))) || !(isBlank(eval("document.tF.private_port_low_"+tmp+".value"))) || !(isBlank(eval("document.tF.inbound_port_low_"+tmp+".value"))) || !(isBlank(eval("document.tF.private_port_high_"+tmp+".value"))) || !(isBlank(eval("document.tF.inbound_port_high_"+tmp+".value"))) )
		{
			for(k = 1; k < tmp; k++)
			{
		        	if(!eval("document.tF.enable_"+k+".checked"))
		                	continue;
	                
	        		if(!(isBlank(eval("document.tF.private_ip_"+k+".value"))) || !(isBlank(eval("document.tF.private_port_low_"+k+".value"))) || !(isBlank(eval("document.tF.inbound_port_low_"+k+".value"))) || !(isBlank(eval("document.tF.private_port_high_"+k+".value"))) || !(isBlank(eval("document.tF.inbound_port_high_"+k+".value"))) )
	        		{
		        		if(parseInt(eval("document.tF.type_"+k+".value")) == parseInt(eval("document.tF.type_"+tmp+".value")) 
						|| 3 == parseInt(eval("document.tF.type_"+k+".value")) 
						|| 3 == parseInt(eval("document.tF.type_"+tmp+".value")))
		        		{
						if( (parseInt(eval("document.tF.inbound_port_low_"+k+".value")) <= parseInt(eval("document.tF.inbound_port_low_"+tmp+".value"))
							&& parseInt(eval("document.tF.inbound_port_low_"+tmp+".value")) <= parseInt(eval("document.tF.inbound_port_high_"+k+".value")))
							|| (parseInt(eval("document.tF.inbound_port_low_"+tmp+".value")) <= parseInt(eval("document.tF.inbound_port_low_"+k+".value"))
							&& parseInt(eval("document.tF.inbound_port_high_"+k+".value")) <= parseInt(eval("document.tF.inbound_port_high_"+tmp+".value"))))
	    	        			{
							alert(langDictionary[133]);
							eval("document.tF.inbound_port_low_"+tmp).focus();
							eval("document.tF.inbound_port_low_"+tmp).select();
							return false;
						}
						if(parseInt(eval("document.tF.inbound_port_low_"+k+".value")) <= parseInt(eval("document.tF.inbound_port_high_"+tmp+".value"))
							&& parseInt(eval("document.tF.inbound_port_high_"+tmp+".value")) <= parseInt(eval("document.tF.inbound_port_high_"+k+".value")))
						{
							alert(langDictionary[133]);
							eval("document.tF.inbound_port_high_"+tmp).focus();
							eval("document.tF.inbound_port_high_"+tmp).select();
							return false;
						}
					}
				}
			}
		}
	}

	if(storeData()==false)
	{
		return false;
	}
	$.post("/goform/formPortFwSimple", $("#p600602").serialize());
        SubmitDelay(15);
	return true;
}
