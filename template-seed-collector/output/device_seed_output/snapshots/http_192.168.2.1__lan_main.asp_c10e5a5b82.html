function storeData(){

function isIncludeDot(s)
{
	var i;
	var c;
	for(i=0;i<s.length;i++)
	{
		c=s.charAt(i);
		if((c=='.'))return true;
	}
	return false;
}
function ipcheck() {
	var f=document.lan_form;
	if(f.lan_ip[0].value<128)
	{
		f.lan_mask[1].value = 0;
		f.lan_mask[2].value = 0;
		f.lan_mask[3].value = 0;
	}
	if((f.lan_ip[0].value<192)&&(f.lan_ip[0].value>127))
	{
		f.lan_mask[1].value = 255;
		f.lan_mask[2].value = 0;
		f.lan_mask[3].value = 0;
	}
	if((f.lan_ip[0].value<240)&&(f.lan_ip[0].value>191))
	{
		f.lan_mask[1].value = 255;
		f.lan_mask[2].value = 255;
		f.lan_mask[3].value = 0;
	}
}

			showMsgMask("p800");
			window.clearInterval(StopBGfunction);
			$("#p800Progress").animate({width: '100%'}, time*1000,function(){
				ChkRebootTypeStop = self.setInterval("SubmitDelayB(5000)", 1000);

function SubmitDelayB(time){
	showMsgMask("p801");

function validateLanClassANetmask(val)
{
	if(val!='255.255.255.0' && val!='255.255.255.128' && val!='255.255.255.192' && val!='255.255.255.224' &&
		val!='255.255.255.240' && val!='255.255.255.248' && val!='255.255.255.252' && val!='255.255.255.254'&&
		val!='255.255.0.0' && val!='255.255.128.0' && val!='255.255.192.0' && val!='255.255.224.0' &&
		val!='255.255.240.0' && val!='255.255.248.0' && val!='255.255.252.0' && val!='255.255.254.0' &&
		val!='255.0.0.0' && val!='255.128.0.0' && val!='255.192.0.0' && val!='255.224.0.0' &&
		val!='255.240.0.0' && val!='255.248.0.0' && val!='255.252.0.0' && val!='255.254.0.0')
	{
		alert(langDictionary['vjs42']);//ken 20130123
		return false;
	}
}
function validateLanNetmask(val)
{
	if(val!='255.255.255.0' && val!='255.255.255.128' && val!='255.255.255.192' && val!='255.255.255.224' &&
		val!='255.255.255.240' && val!='255.255.255.248' && val!='255.255.255.252' )
	{
		alert(langDictionary['vjs42']);//ken 20130123
		return false;
	}
}
function checklan(){
	var f=document.lan_form;
	var token;
	if((f.lan_ip[0].value)!='192' || (f.lan_ip[1].value)!='168')
	{
		if((f.lan_ip[0].value)!='10'){
			if ((f.lan_ip[0].value)!='172' || (f.lan_ip[1].value) < 16 || (f.lan_ip[1].value) > 31)
			{
				alert(langDictionary['msg_privateIP_invalid_']);
				return false;
			}
		}
	}
	if((f.lan_ip[0].value)=='192' && (f.lan_ip[1].value)=='168')
	{
		if(validateLanNetmask(f.mask.value)==false) return false;
	}
	if((f.lan_ip[0].value)=='10')
	{	
		if(validateLanClassANetmask(f.mask.value)==false) return false;
	}
	if ((f.lan_ip[0].value=='172') && (f.lan_ip[1].value >=16) && (f.lan_ip[1].value <=31))
	{	
		if(validateLanClassANetmask(f.mask.value)==false) return false;
	}
	if(validateGateway(f.ip.value,f.mask.value,f.dhcpRangeStart.value)==false)return false;
	if(validateStartEndIp(f.ip.value,f.mask.value,f.dhcpRangeStart.value,f.dhcpRangeEnd.value)==false)return false;
	return true;
}
