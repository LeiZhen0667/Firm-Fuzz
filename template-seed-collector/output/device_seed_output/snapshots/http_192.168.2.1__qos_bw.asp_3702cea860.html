function dotfunction(){
	var f = document.tF
	A1 = f.down_speed_box.value

	t1=A1.indexOf('.');
	if(t1 == -1){
		f.down_speed_box.value = A1+".00"
	}
	else{
		if(A1.length - t1 == 2 )
			f.down_speed_box.value = A1+"0"
		else if(A1.length - t1 == 1)
			f.down_speed_box.value = A1+"00"
	}

	t2=A2.indexOf('.');
	if(t2 == -1){
		f.up_speed_box.value = A2+".00"

	}
}
