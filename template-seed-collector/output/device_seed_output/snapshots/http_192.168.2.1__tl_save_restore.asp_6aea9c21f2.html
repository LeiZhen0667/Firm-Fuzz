function initDataHeader(){
	$("#dhSSID").html(HTMLEnCode(ssid));
	$("#dhToggleBand").html(langDictionary["dhToggleBand"]);//ken
	var encrypt = 2
	if (encrypt == 0){
		str24genc=""
		str24gpwd=""
	}
	else if(encrypt == 1){
		var wepValueAll = new Array("0000000000","0000000000","0000000000","0000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000")
		if (0 == 1){
			str24genc="64bit WEP"

		}

			str24genc="128bit WEP"
			str24gpwd=wepValueAll[4]
		}
	}

		str24gpwd="66caye9w"
	}
	encrypt = 2
	if (encrypt == 0){
		str5gpwd=""
	}
	else if(encrypt == 1){
		var wepValueAll = new Array("0000000000","0000000000","0000000000","0000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000")
		if (0 == 1){
			str5gpwd=wepValueAll[0]
		}
		else{

		}
	}
	else{

	}

	$.get("getLoginStatus.asp", { NoCache: ts }, function (data) {
		if(data == 0){
			str24gpwd=TexttoEncry(str24gpwd)
			$("#dhPasswordObscured24").html(HTMLEnCode(str24gpwd));
		}
		else{
			$("#dhPasswordObscured24").html(HTMLEnCode(str24gpwd));
		}
	})

	StopBGfunction = self.setInterval("ChkinitConnectType()", 5000);
}
var ChkRebootTypeStopF;
var DelayTmpStop;
function SubmitDelayF(time){
	$.get("getLoginStatus.asp", { noCache: Math.floor(Math.random() * 10000) }, function (data) {
		if(data == 0){
			document.location.replace("000-dashboard.asp?LockUrl=loginlock");
			return  ;
		}
		else{
			showMsgMask("p800");
			window.clearInterval(StopBGfunction);
				$("#p800Progress").animate({width: '100%'}, time*1000,function(){
				DelayTmpStop = self.setInterval("DelayTmp()", 5000);
			});
		}
	});
}
function DelayTmp(){
	showMsgMask("p804");
	window.clearInterval(DelayTmpStop);
	ChkRebootTypeStopF = self.setInterval("ChkRebootTypeF()", 5000);
}
function ChkRebootTypeF(){
	$.get("testalive.html", { NoCache: ts }, function(data) {
		window.clearInterval(ChkRebootTypeStopF);
		window.top.location.assign("http://192.168.2.1")
	});
}
