function initDataHeader(){
	$("#dhSSID").html(HTMLEnCode(ssid));
	$("#dhToggleBand").html(langDictionary["dhToggleBand"]);//ken
	var encrypt = 2
	if (encrypt == 0){
		str24genc=""

	}
	else if(encrypt == 1){
		var wepValueAll = new Array("0000000000","0000000000","0000000000","0000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000","00000000000000000000000000")
		if (0 == 1){
			str24genc="64bit WEP"

		}

		}
		else{

		}
	}

		str5gpwd="66caye9w"
	}

	$.get("getLoginStatus.asp", { NoCache: ts }, function (data) {

	})

} 
function evaltF(){
var f = document.tF
//	if (f.health_enable[0].checked == true) f.enable.value = 1

f.day.value = 0

if (f.health_day2.checked == true) f.day.value = parseInt(f.day.value) + 2
if (f.health_day3.checked == true) f.day.value = parseInt(f.day.value) + 4
if (f.health_day4.checked == true) f.day.value = parseInt(f.day.value) + 8
if (f.health_day5.checked == true) f.day.value = parseInt(f.day.value) + 16
if (f.health_day6.checked == true) f.day.value = parseInt(f.day.value) + 32
if (f.health_day7.checked == true) f.day.value = parseInt(f.day.value) + 64
if (f.day.value == 0) return false
$.post("/goform/formSelfHealing", $("#p600707").serialize());
SubmitDelay(2);
}
